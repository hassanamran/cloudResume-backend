AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Cloud Resume Challenge - Backend

Resources:

  VisitorTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Resume-visitorCount
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  VisitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Visitor-counter
      CodeUri: ./
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Environment:
        Variables:
          TABLE_NAME: !Ref VisitorTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitorTable
      Events:
        GetCount:
          Type: Api
          Properties:
            Path: /count
            Method: GET

Outputs:
  ApiUrl:
    Description: "Paste this URL into your JavaScript fetch call to call the API"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/count"
    